capa:
  tag_prefix: "Apresentação Exclusiva ·"
  headline_1: "FLOW"
  headline_2: "AI"
  lead: "O mentor criativo digital inspirado em Murilo Gun"
  cta: "Ver a apresentação →"
  icons:
    - glyph: "⟳"
      label: "3 Modos"
    - glyph: "◎"
      label: "IA Real"
    - glyph: "✦"
      label: "Seu Jeito"

problema:
  tag: "O Problema"
  title: "Acesso ao pensamento criativo é exclusivo."
  cards:
    - num: "01"
      title: "Mentores são inacessíveis"
      body: >
        Uma hora com um mentor de alto calibre custa R$500–R$2.000.
        Para a maioria das pessoas, transformação intelectual profunda nunca
        esteve disponível — bloqueada por preço, agenda e geografia.
    - num: "02"
      title: "IAs genéricas não provocam"
      body: >
        ChatGPT responde tudo com o mesmo tom neutro. Sem identidade,
        sem provocação, sem a fricção necessária para transformar a forma
        como alguém pensa. Informação sem desestruturação não gera mudança.
    - num: "03"
      title: "Cursos são monólogos"
      body: >
        Você assiste, anota, esquece. Ninguém te desafia no seu contexto
        específico, ninguém faz a pergunta que você precisava ouvir.
        Aprendizado sem diálogo atrofia a criatividade.

solucao:
  tag: "A Solução"
  title_1: "Murilo Gun."
  title_2: "No seu bolso."
  title_3: "24h por dia."
  lead: >
    Flow AI captura a essência do método Murilo Gun — provocar antes de
    responder, desestruturar antes de construir, perguntar antes de concluir.
    Em tempo real, personalizado para cada pessoa, a qualquer hora.
  checks:
    - "Provoca o pensamento, não entrega respostas prontas"
    - "Sem respostas genéricas — cada resposta é contextual"
    - "Sempre termina com a pergunta certa, não a resposta óbvia"
    - "100% em português, com a voz e filosofia de Murilo"
    - "Memória de conversa — evolui com o usuário ao longo do tempo"
  demo_user: "Não sei como me diferenciar no mercado."
  demo_ai: |
    Pergunta errada. Todo mundo quer se diferenciar — e aí viram a mesma coisa.

    O que só VOCÊ faz que os outros evitam fazer?

    → O que te dá um medo gostoso?

modos:
  tag: "Os Modos"
  title_1: "Três formas de"
  title_2: "destravar."
  modes:
    - icon: "✦"
      name: "Criatividade"
      sub: "Brainstorm & ideias"
      color: "#F5A623"
      desc: >
        Expande possibilidades conectando conceitos que nunca se encontraram.
        Usa a teoria da combinatividade de Murilo: nada se cria, tudo se combina —
        mas combinar de um jeito inédito é o que muda o jogo.
      badge: "Ativar →"
    - icon: "◎"
      name: "Reflexão"
      sub: "Autoconhecimento"
      color: "#7B68EE"
      desc: >
        Perguntas filosóficas que mergulham fundo no propósito, identidade e
        padrões internos. Baseado na premissa: a qualidade de tudo que você faz
        depende do estado interno de quem faz.
      badge: "Ativar →"
    - icon: "◆"
      name: "Marca Pessoal"
      sub: "Posicionamento"
      color: "#00C896"
      desc: >
        Constrói a narrativa que faz as pessoas lembrarem de você por ser
        inconfundível — não por ser diferente. Explora o que você quase pede
        desculpa de ser, porque ali está o seu diferencial real.
      badge: "Ativar →"

funcionamento:
  tag: "Como Funciona"
  title_1: "Simples por fora."
  title_2: "Poderoso por dentro."
  steps:
    - icon: "🎛️"
      num: "01"
      title: "Usuário escolhe o modo"
      desc: >
        Criatividade, Reflexão ou Marca Pessoal. Cada seleção ativa um
        system prompt distinto, calibrado com transcrições reais de Murilo
        Gun, moldando tom, estilo e tipo de provocação.
    - icon: "⚡"
      num: "02"
      title: "Flow AI desestrutura"
      desc: >
        Em vez de responder diretamente, a IA quebra a premissa da pergunta
        com uma analogia inesperada — coqueiro, pipoca, roda, furadeira.
        O desequilíbrio cognitivo é o início do insight.
    - icon: "🌀"
      num: "03"
      title: "Conversa que aprofunda"
      desc: >
        Cada resposta do usuário abre uma nova camada. A IA não conclui —
        ela aprofunda. O histórico completo da conversa é enviado a cada
        turno, mantendo coerência e continuidade real.
    - icon: "🧠"
      num: "04"
      title: "Memória e evolução"
      desc: >
        Com RAG e banco vetorial, o sistema aprende padrões do usuário
        entre sessões. A IA vai ficando mais precisa, mais pessoal, mais
        Murilo — quanto mais você usa, mais ela entende quem você é.

tech:
  tag: "Tecnologia"
  title_1: "Stack de"
  title_2: "nível enterprise."
  lead: >
    Arquitetura desenhada para escalar de 10 a 100 mil usuários sem
    reescrever uma linha. Cada camada foi escolhida para maximizar
    velocidade, personalização e custo-eficiência.
  checks:
    - "RAG com busca semântica contextual via Pinecone"
    - "Memória persistente por usuário com Redis + PostgreSQL"
    - "Streaming de tokens em tempo real via SSE"
    - "Monetização Free/Pro com Stripe + webhooks"
    - "Deploy containerizado com Docker + CI/CD automático"
  stack:
    - layer: "INTERFACE"
      color: "#41B883"
      chips: ["Bridgetown 2.1", "Bulma CSS", "Vanilla JS"]
    - layer: "BACKEND"
      color: "#E8FF00"
      chips: ["Roda + Puma", "Ruby 3.3", "PostgreSQL 16"]
    - layer: "INTELIGÊNCIA"
      color: "#7B68EE"
      chips: ["Gemini 2.5 Flash", "RAG + Pinecone", "Redis"]
    - layer: "INFRA"
      color: "#00C896"
      chips: ["Docker", "Render.com", "GitHub Actions"]

resultado:
  tag: "O Resultado"
  title_1: "Murilo Gun disponível"
  title_2: "para qualquer pessoa,"
  title_3: "a qualquer hora."
  lead: >
    Flow AI não é só um produto. É a democratização de um jeito único de
    pensar — escalando o impacto de Murilo de centenas para milhões de
    pessoas. O mentor que antes custava R$2.000/hora, agora acessível
    a qualquer momento, em qualquer dispositivo.
  metrics:
    - val: "∞"
      label: "Acessos/dia"
      sub: "Sem limite de escala"
    - val: "3×"
      label: "Modos especializados"
      sub: "Criatividade, Reflexão, Marca"
    - val: "< 3s"
      label: "Latência média"
      sub: "Resposta em tempo real"
    - val: "R$0"
      label: "Plano gratuito"
      sub: "Para o usuário básico"

